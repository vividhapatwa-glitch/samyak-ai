<!DOCTYPE html>
<html>
<head>
  <title>Aagam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    .back-btn {
      margin-top: 20px;
      background: #f4c430;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .back-btn:hover {
      background: #e0b020;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .emoji {
      font-size: 28px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="title">
      <div class="emoji">📖</div>
      <h1>Aagam</h1>
    </div>

    <p style="line-height:1.6; color:#444;">
      Aagam refers to Jain scriptures containing teachings of Tirthankaras.
      These sacred texts guide spiritual growth, moral conduct, ahimsa, and
      understanding of reality.
    </p>

    <button class="back-btn" onclick="window.location.href='/'">
      ⬅ Back to Home
    </button>

  </div>

</div>

</body>
</html>
