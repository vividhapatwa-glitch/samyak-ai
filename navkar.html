<!DOCTYPE html>
<html>
<head>
  <title>Navkar Mantra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .header {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .thumbnail {
      width: 120px;
      height: 80px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
    }

    .title {
      font-weight: bold;
      font-size: 18px;
    }

    .play-btn {
      background: #3b4cca;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      margin-left: auto;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      border: none;
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      margin-top: 10px;
    }

    .tab {
      padding: 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .active {
      border-bottom: 2px solid blue;
      font-weight: bold;
    }

    .lyrics {
      margin-top: 15px;
      line-height: 1.7;
      color: #444;
      white-space: pre-line;
    }

    .btn {
      background: #f4c430;
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="card header">
    <div class="thumbnail" style="background-image:url('https://i.ytimg.com/vi/5qap5aO4i9A/hqdefault.jpg')"></div>

    <div>
      <div class="title">Navkar Mantra</div>
      <div style="color:gray;">Jain Stavan</div>
    </div>

    <button class="play-btn" onclick="play()">▶</button>
  </div>

  <!-- VIDEO -->
  <div class="card">
    <iframe id="video" src=""></iframe>
  </div>

  <!-- TABS -->
  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="show('guj', this)">Gujarati</div>
      <div class="tab" onclick="show('hin', this)">Hindi</div>
      <div class="tab" onclick="show('eng', this)">English</div>
    </div>

    <div id="lyrics" class="lyrics">
ણમો અરીહંતાણં  
ણમો સિદ્ધાણં  
ણમો આયરિયાણં  
ણમો ઉવજ્ઝાયાણં  
ણમો લોયે સવ્વ સહૂણં
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="card">
    <button class="btn" onclick="askAI()">🤖 Explain Meaning</button>
    <button class="btn" onclick="window.location.href='/'">⬅ Back</button>
  </div>

</div>

<script>
function play() {
  document.getElementById("video").src =
    "https://www.youtube.com/embed/5qap5aO4i9A?autoplay=1";
}

function show(lang, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  const data = {
    guj: `ણમો અરીહંતાણં
ણમો સિદ્ધાણં
ણમો આયરિયાણં
ણમો ઉવજ્ઝાયાણં
ણમો લોયે સવ્વ સહૂણં`,

    hin: `णमो अरिहंताणं
णमो सिद्धाणं
णमो आयरियाणं
णमो उवज्झायाणं
णमो लोए सव्व साहूणं`,

    eng: `I bow to Arihants
I bow to Siddhas
I bow to Acharyas
I bow to Upadhyayas
I bow to all saints`
  };

  document.getElementById("lyrics").innerText = data[lang];
}

function askAI() {
  window.location.href = "/";
  setTimeout(() => {
    document.getElementById("input").value = "Explain Navkar Mantra meaning";
  }, 500);
}
</script>

</body>
</html>
