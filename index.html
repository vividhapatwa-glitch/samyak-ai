<script>

window.onload = function () {
  try {
    const chat = document.getElementById("chat");

    if (chat) {
      chat.innerHTML = `
        <div class="bot">
          <span class="bubble-bot">
            🙏 Welcome to Samyak AI<br><br>
            Ask me anything about Jain philosophy.
          </span>
        </div>
      `;
    }
  } catch (e) {
    console.error("Error in onload:", e);
  }
};


async function send() {
  try {
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");

    if (!input || !chat) return;

    const message = input.value.trim();
    if (!message) return;

    chat.innerHTML += `
      <div class="user">
        <span class="bubble-user">${message}</span>
      </div>
    `;

    input.value = "";

    const loadingId = "load-" + Date.now();

    chat.innerHTML += `
      <div id="${loadingId}" class="bot">
        <span class="bubble-bot">Guru is thinking...</span>
      </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    const el = document.getElementById(loadingId);
    if (el) {
      el.innerHTML = `
        <span class="bubble-bot">
          ${data.reply || data.error || "No response"}
        </span>
      `;
    }

    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    console.error(err);
  }
}


function quick(q) {
  try {
    const input = document.getElementById("input");
    if (input) {
      input.value = q;
      send();
    }
  } catch (e) {
    console.error(e);
  }
}

</script>
