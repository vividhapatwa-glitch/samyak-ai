<script>

// ✅ Welcome message on load
window.onload = () => {
  const chat = document.getElementById("chat");

  chat.innerHTML = `
    <div class="bot">
      <span class="bubble-bot">
        🙏 Welcome to Samyak AI<br><br>
        Ask me anything about Jain philosophy, karma, ahimsa, or daily life.
      </span>
    </div>
  `;
};


// ✅ Send message to AI
async function send() {
  const input = document.getElementById("input");
  const message = input.value.trim();

  if (!message) return;

  const chat = document.getElementById("chat");

  // 🟡 Show user message
  chat.innerHTML += `
    <div class="user">
      <span class="bubble-user">${message}</span>
    </div>
  `;

  // scroll down
  chat.scrollTop = chat.scrollHeight;

  input.value = "";

  // 🟡 Loading message
  const loadingId = "loading-" + Date.now();

  chat.innerHTML += `
    <div id="${loadingId}" class="bot">
      <span class="bubble-bot">Guru is thinking...</span>
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    // 🟢 Replace loading with AI response
    document.getElementById(loadingId).innerHTML = `
      <span class="bubble-bot">
        ${data.reply || data.error || "No response"}
      </span>
    `;

    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    document.getElementById(loadingId).innerHTML = `
      <span class="bubble-bot">
        ❌ Error connecting to AI
      </span>
    `;
  }
}


// ✅ Quick question buttons
function quick(q) {
  document.getElementById("input").value = q;
  send();
}

</script>
