<!DOCTYPE html>
<html>
<head>
  <title>Samyak AI – Jain Guru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 10px;
    }

    #stavanPlayer button {
  margin: 5px;
  padding: 8px 12px;
  background: #f4c430;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
    /* CHAT */
    #chat {
      height: 400px;
      overflow-y: auto;
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .user, .bot {
      margin: 10px 0;
    }

    .user { text-align: right; }
    .bot { text-align: left; }

    .bubble-user {
      background: #f4c430;
      padding: 10px 14px;
      border-radius: 15px;
      display: inline-block;
      max-width: 70%;
    }

    .bubble-bot {
      background: #eee;
      padding: 10px 14px;
      border-radius: 15px;
      display: inline-block;
      max-width: 70%;
    }

    /* INPUT */
    .input-area {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #f4c430;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* SUGGESTIONS */
    .suggestions {
      text-align: center;
      margin-top: 15px;
    }

    .suggestions button {
      margin: 5px;
      background: #eee;
      border-radius: 20px;
      padding: 8px 12px;
      border: none;
    }

    /* SECTIONS */
    .section {
      background: white;
      margin-top: 25px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .card {
      background: #fafafa;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #eee;
    }

    .card:hover {
      background: #fff8dc;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

<h1>🪔 Samyak AI – Jain Guru</h1>

<div class="container">

  <!-- CHAT -->
  <div id="chat"></div>

  <!-- INPUT -->
  <div class="input-area">
    <input id="input" placeholder="Ask about Jainism..." />
    <button onclick="send()">Send</button>
  </div>

  <!-- SUGGESTIONS -->
  <div class="suggestions">
    <p>Try asking:</p>
    <button onclick="quick('What is Navkar Mantra?')">Navkar Mantra</button>
    <button onclick="quick('How to reduce karma?')">Reduce Karma</button>
    <button onclick="quick('What is ahimsa?')">Ahimsa</button>
  </div>

  <!-- DAILY PRACTICE -->
  <div class="section">
    <h3>Daily Jain Practice</h3>
    <div class="cards">
      <div class="card" onclick="quick('Explain Navkar Mantra practice')">
        🌼 Morning Navkar Focus
      </div>
      <div class="card" onclick="quick('Daily Jain habits')">
        🌿 Small Spiritual Habits
      </div>
      <div class="card" onclick="quick('Jain fasting rules')">
        🔥 Fasting Guidance
      </div>
    </div>
  </div>

  <!-- KNOWLEDGE -->
  <div class="section">
    <h3>Knowledge Library</h3>
    <div class="cards">
      <div class="card" onclick="window.location.href='aagam.html'">📖 Aagam</div>
      <div class="card" onclick="quick('Explain Jain Granth')">📚 Granth</div>
      <div class="card" onclick="quick('Tell Jain stories')">📜 Jain Stories</div>
      <div class="card" onclick="quick('Explain 24 Tirthankars')">🧘 24 Tirthankars</div>
      <div class="card" onclick="quick('Explain Karma Theory')">⚖ Karma Theory</div>
      <div class="card" onclick="quick('Explain Gunasthanak')">🔺 Gunasthanak</div>
    </div>
  </div>

</div>

<script>

// Welcome message
window.onload = function () {
  const chat = document.getElementById("chat");

  chat.innerHTML = `
    <div class="bot">
      <span class="bubble-bot">
        🙏 Welcome to Samyak AI<br><br>
        Ask me anything about Jain philosophy, karma, and ahimsa.
      </span>
    </div>
  `;
};

// Send message
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = input.value.trim();
  if (!message) return;

  chat.innerHTML += `
    <div class="user">
      <span class="bubble-user">${message}</span>
    </div>
  `;

  input.value = "";

  const loadingId = Date.now();

  chat.innerHTML += `
    <div id="${loadingId}" class="bot">
      <span class="bubble-bot">Guru is thinking...</span>
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    document.getElementById(loadingId).innerHTML = `
      <span class="bubble-bot">${data.reply || data.error}</span>
    `;

    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    document.getElementById(loadingId).innerHTML =
      `<span class="bubble-bot">Error connecting to AI</span>`;
  }
}

// Quick buttons
function quick(q) {
  document.getElementById("input").value = q;
  send();
}

</script>

</body>
</html>
<div class="section">
  <h3>🎵 Stavan & Stuti</h3>

  <div class="cards" id="stavanList"></div>

  <!-- PLAYER -->
  <div id="stavanPlayer" style="margin-top:20px; display:none;">
    <h4 id="stavanTitle"></h4>

    <iframe id="videoFrame"
      width="100%"
      height="250"
      style="border-radius:10px;"
      allowfullscreen>
    </iframe>

    <div style="margin-top:10px;">
      <button onclick="showLyrics()">📜 Lyrics</button>
      <button onclick="askMeaning()">🧠 Meaning</button>
    </div>

    <div id="lyricsBox" style="margin-top:10px; display:none; background:#fafafa; padding:10px; border-radius:10px;"></div>
  </div>
</div>
<script>

const stavans = [
  {
    name: "Navkar Mantra",
    video: "https://www.youtube.com/embed/5qap5aO4i9A",
    lyrics: "Namo Arihantanam\nNamo Siddhanam\nNamo Ayariyanam\nNamo Uvajjhayanam\nNamo Loe Savva Sahunam",
    meaning: "Explain Navkar Mantra in simple terms"
  },
  {
    name: "Bhaktamar Stotra",
    video: "https://www.youtube.com/embed/DLX62G4lc44",
    lyrics: "Bhaktamar-pranata-mauli-mani-prabhaana...",
    meaning: "Explain Bhaktamar Stotra"
  },
  {
    name: "Uvasaggaharam Stotra",
    video: "https://www.youtube.com/embed/aqz-KE-bpKQ",
    lyrics: "Uvasaggaharam pasam...",
    meaning: "Explain Uvasaggaharam Stotra"
  }
];

let currentStavan = null;

// Load cards
window.addEventListener("load", () => {
  const list = document.getElementById("stavanList");

  stavans.forEach((s, index) => {
    list.innerHTML += `
      <div class="card" onclick="playStavan(${index})">
        🎶 ${s.name}
      </div>
    `;
  });
});

// Play stavan
function playStavan(index) {
  const s = stavans[index];
  currentStavan = s;

  document.getElementById("stavanPlayer").style.display = "block";
  document.getElementById("videoFrame").src = s.video;
  document.getElementById("stavanTitle").innerText = s.name;

  document.getElementById("lyricsBox").style.display = "none";
}

// Show lyrics
function showLyrics() {
  if (!currentStavan) return;

  const box = document.getElementById("lyricsBox");
  box.style.display = "block";
  box.innerText = currentStavan.lyrics;
}

// Ask AI meaning
function askMeaning() {
  if (!currentStavan) return;

  quick(currentStavan.meaning);
}

</script>
