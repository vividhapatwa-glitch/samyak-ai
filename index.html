<!DOCTYPE html>
<html>
<head>
  <title>Samyak AI</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .chat-box {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      height: 400px;
      overflow-y: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .user {
      text-align: right;
      margin: 10px;
      color: blue;
    }

    .bot {
      text-align: left;
      margin: 10px;
      color: #333;
    }

    .input-area {
      max-width: 600px;
      margin: 10px auto;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .suggestions {
      max-width: 600px;
      margin: auto;
      margin-top: 10px;
    }

    .suggestions button {
      margin: 5px;
      background: #eee;
    }
  </style>
</head>

<body>

<h1>🪔 Samyak AI - Jain Guru</h1>

<div class="chat-box" id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Ask about Jainism..." />
  <button onclick="send()">Send</button>
</div>

<!-- ✅ Sample Questions -->
<div class="suggestions">
  <p>Try asking:</p>
  <button onclick="quick('What is Navkar Mantra?')">Navkar Mantra</button>
  <button onclick="quick('How to reduce karma?')">Reduce Karma</button>
  <button onclick="quick('What is ahimsa?')">Ahimsa</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const message = input.value;

  if (!message) return;

  const chat = document.getElementById("chat");

  // user message
  chat.innerHTML += `<div class="user"><b>You:</b> ${message}</div>`;

  input.value = "";

  // loading
  const loadingId = Date.now();
  chat.innerHTML += `<div class="bot" id="${loadingId}">Guru is thinking...</div>`;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    document.getElementById(loadingId).innerHTML =
      `<b>Guru:</b> ${data.reply}`;

    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    document.getElementById(loadingId).innerHTML =
      "Error connecting to AI";
  }
}

// quick buttons
function quick(q) {
  document.getElementById("input").value = q;
  send();
}
</script>

</body>
</html>
